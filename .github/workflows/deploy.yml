name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      APP_ENV: production
      APP_URL: https://shakeelansari.me
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}

    steps:
      - uses: actions/checkout@v4

      - name: Build UI
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run build
        working-directory: ui

      - name: Build API
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql
      - run: composer install --no-dev --optimize-autoloader
        working-directory: api

      - name: Generate .env from template
        run: |
          cp api/.env.template api/.env
          grep -oP '{#\K[^#]+(?=#})' api/.env.template | while IFS= read -r var; do
              val="${!var}"
              sed -i "s|{#$var#}|$val|g" api/.env
          done

      - name: Assemble deployable
        run: |
          mkdir -p deploy/api
          cp -r ui/dist/* deploy/
          cp -r api/public deploy/api/public
          cp -r api/src deploy/api/src
          cp -r api/vendor deploy/api/vendor
          cp -r api/.htaccess deploy/api/
          cp -r api/.env deploy/api/
          cp -r blogs deploy/blogs
          cp -r learn deploy/learn
          cp .htaccess deploy/

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Hostinger
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PASS: ${{ secrets.DEPLOY_PASSWORD }}
          DPTH: ${{ secrets.DEPLOY_PATH }}
        run: |
          lftp -c "
            set net:connection-limit 10;
            set mirror:parallel-transfer-count 10;
            set net:socket-buffer 65535;
            set ftp:ssl-force true;
            set ssl:verify-certificate no;
            open -u $USER,$PASS ftp://$HOST;
            mirror -R --delete --parallel=15 --verbose deploy/ $DPTH;
            quit
          "
