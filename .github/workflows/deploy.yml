name: Build & Deploy

on:
    push:
        branches: [main]

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        environment: production

        steps:
            - uses: actions/checkout@v4

            - name: Build UI
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: ui/package-lock.json
            - run: npm ci
              working-directory: ui
            - run: npm run build
              working-directory: ui

            - name: Build API
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.2
                  extensions: mbstring, pdo
            - run: composer install --no-dev --optimize-autoloader
              working-directory: api

            - name: Assemble deployable
              run: |
                  mkdir -p deploy/api/public
                  cp -r ui/dist/* deploy/
                  cp -r api/public deploy/api/public
                  cp -r api/src deploy/api/src
                  cp -r api/vendor deploy/api/vendor
                  cp -r api/.htaccess deploy/api/
                  cp .htaccess deploy/

            - name: Install lftp
              run: sudo apt-get update && sudo apt-get install -y lftp

            - name: Deploy to Hostinger
              env:
                  HOST: ${{ secrets.DEPLOY_HOST }}
                  USER: ${{ secrets.DEPLOY_USER }}
                  PASS: ${{ secrets.DEPLOY_PASSWORD }}
                  DPTH: ${{ secrets.DEPLOY_PATH }}
              run: |
                  lftp -c "
                    set net:connection-limit 10;
                    set mirror:parallel-transfer-count 10;
                    set net:socket-buffer 65535;
                    set ftp:ssl-force true;
                    set ssl:verify-certificate no;
                    open -u $USER,$PASS ftp://$HOST;
                    mirror -R --delete --parallel=10 --verbose deploy/ $DPTH;
                    quit
                  "
