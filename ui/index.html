<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="[{#SEO-DESC#}]" />
        <meta name="robots" content="index, follow" />

        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <link rel="canonical" href="https://[{#SEO-DOMAIN#}]" />

        <title>[{#SEO-NAME#}] — [{#SEO-TITLE#}]</title>

        <meta property="og:title" content="[{#SEO-NAME#}] — [{#SEO-TITLE#}]" />
        <meta property="og:description" content="[{#SEO-DESC#}]" />
        <meta property="og:url" content="https://[{#SEO-DOMAIN#}]" />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="[{#SEO-AVATAR-URL#}]" />

        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="[{#SEO-NAME#}]" />
        <meta name="twitter:description" content="[{#SEO-DESC-SHORT#}]" />

        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "Person",
                "name": "[{#SEO-NAME#}]",
                "url": "https://[{#SEO-DOMAIN#}]",
                "jobTitle": "[{#SEO-TITLE#}]",
                "sameAs": [
                    "[{#SEO-GITHUB-URL#}]",
                    "[{#SEO-LINKEDIN-URL#}]",
                    "https://twitter.com/[{#SEO-TWITTER-USER#}]"
                ]
            }
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
